// ===== Repost tracking =====
// Each repost creates a new post referencing the original

// ===== 存储 =====
let allPosts = JSON.parse(localStorage.getItem('ocean_forum_posts_v2') || 'null');
if (!allPosts || allPosts.length === 0) {
  allPosts = seedPosts.map(p => ({...p, comments: [...(p.comments||[])], isRepost: false, originalAuthor: null, originalId: null}));
  localStorage.setItem('ocean_forum_posts_v2', JSON.stringify(allPosts));
}

// Initialize comment localStorage from seed data
seedPosts.forEach(p => {
  const key = 'ocean_forum_comments_v2_' + p.id;
  if (!localStorage.getItem(key)) {
    localStorage.setItem(key, JSON.stringify(p.comments || []));
  }
});

// ===== 渲染帖子 =====
function renderPosts(filterTag) {
  const container = document.getElementById('posts-container');
  const countEl = document.getElementById('post-count');
  let posts = filterTag ? allPosts.filter(p => p.tags && p.tags.includes(filterTag)) : allPosts;
  countEl.textContent = posts.length + ' posts';

  if (posts.length === 0) {
    container.innerHTML = '<div class="tactile-base rounded-xl p-12 text-center text-cyan-400/30">No posts with this tag yet.</div>';
    return;
  }

  container.innerHTML = posts.map(p => `
    <div class="tactile-base rounded-2xl overflow-hidden" id="post-${p.id}">
      ${p.isRepost ? `<div class="px-5 pt-4"><span class="reposted-badge"><iconify-icon icon="mdi:repeat" width="12"></iconify-icon> Reposted from ${p.originalAuthor || 'Unknown'}</span></div>` : ''}
      <div class="md:flex">
        ${p.image ? `<div class="md:w-64 flex-shrink-0 overflow-hidden" style="min-height:200px;"><img src="${p.image}" alt="${p.title}" class="post-image w-full h-full object-cover" onerror="this.parentElement.style.display='none'" style="min-height:200px;"></div>` : ''}
        <div class="flex-1 p-5">
          <div class="flex items-center gap-2 mb-1.5 flex-wrap">
            ${(p.tags||[]).map(t => `<span class="text-[10px] px-2 py-0.5 rounded-full bg-cyan-500/10 border border-cyan-500/15 text-cyan-400 cursor-pointer hover:bg-cyan-500/20 transition-colors" onclick="event.stopPropagation();renderPosts('${t}')">#${t}</span>`).join('')}
          </div>
          <h3 class="text-base font-semibold text-cyan-50 mb-2">${p.title}</h3>
          <div class="text-sm text-cyan-200/65 mb-3 leading-relaxed max-h-20 overflow-hidden">${p.content.replace(/<[^>]*>/g, '').substring(0, 200)}...</div>
          <div class="flex items-center justify-between text-xs text-cyan-400/40 flex-wrap gap-2">
            <div class="flex items-center gap-3">
              <span class="flex items-center gap-1"><iconify-icon icon="mdi:account-circle" width="14"></iconify-icon>${p.author}</span>
              <span>${p.date}</span>
              ${p.reposts > 0 ? `<span class="flex items-center gap-1"><iconify-icon icon="mdi:repeat" width="12"></iconify-icon>${p.reposts}</span>` : ''}
            </div>
            <div class="flex items-center gap-3">
              <button onclick="likePost(${p.id})" class="flex items-center gap-1 hover:text-cyan-300 transition-colors bg-transparent border-0 cursor-pointer" style="color:inherit;"><iconify-icon icon="mdi:heart-outline" width="14"></iconify-icon>${p.likes||0}</button>
              <button onclick="repostPost(${p.id})" class="flex items-center gap-1 hover:text-cyan-300 transition-colors bg-transparent border-0 cursor-pointer" style="color:inherit;"><iconify-icon icon="mdi:repeat" width="14"></iconify-icon>${p.reposts||0}</button>
              <button onclick="toggleExpand(${p.id})" class="flex items-center gap-1 hover:text-cyan-300 transition-colors bg-transparent border-0 cursor-pointer" style="color:inherit;"><iconify-icon icon="mdi:comment-outline" width="14"></iconify-icon>${getCommentCount(p.id)}</button>
            </div>
          </div>
          <div class="hidden mt-4 pt-4 border-t border-cyan-500/10" id="expand-${p.id}">
            <div class="text-sm text-cyan-200/75 whitespace-pre-line leading-relaxed">${p.content}</div>
            ${p.image ? `<div class="mt-4 rounded-lg overflow-hidden"><img src="${p.image}" alt="${p.title}" class="w-full object-cover rounded-lg" style="max-height:400px;" onerror="this.style.display='none'"></div>` : ''}
            <div class="mt-4" id="comments-section-${p.id}">
              <h4 class="text-xs font-medium text-cyan-400/50 mb-2">Comments (${getCommentCount(p.id)})</h4>
              <div id="comments-list-${p.id}" class="space-y-2 mb-3"></div>
              <div class="flex gap-2">
                <input type="text" id="comment-input-${p.id}" placeholder="Add a comment..." class="flex-1 bg-cyan-950/30 border border-cyan-500/10 rounded-lg px-3 py-1.5 text-xs text-cyan-100 placeholder:text-cyan-400/25 focus:outline-none focus:border-cyan-400/40">
                <button onclick="addComment(${p.id})" class="btn-physical-dark px-3 py-1.5 rounded-lg text-xs">Send</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function getCommentCount(id) {
  const key = 'ocean_forum_comments_v2_' + id;
  const comments = JSON.parse(localStorage.getItem(key) || '[]');
  return comments.length;
}

// ===== 交互函数 =====
function toggleExpand(id) {
  const el = document.getElementById('expand-' + id);
  if (!el) return;
  const wasHidden = el.classList.contains('hidden');
  el.classList.toggle('hidden');
  if (!el.classList.contains('hidden')) loadComments(id);
}

function likePost(id) {
  const post = allPosts.find(p => p.id === id);
  if (!post) return;
  post.likes = (post.likes||0) + 1;
  localStorage.setItem('ocean_forum_posts_v2', JSON.stringify(allPosts));
  renderCurrentFilter();
  showToast('Liked! ❤️');
}

function repostPost(id) {
  const post = allPosts.find(p => p.id === id);
  if (!post) return;
  post.reposts = (post.reposts||0) + 1;
  const repost = {
    id: Date.now(),
    author: 'Anonymous',
    date: new Date().toISOString().split('T')[0],
    title: '🔁 ' + post.title,
    content: post.content,
    image: post.image,
    tags: [...(post.tags||[])],
    likes: 0,
    reposts: 0,
    isRepost: true,
    originalAuthor: post.author,
    originalId: post.id
  };
  allPosts.unshift(repost);
  localStorage.setItem('ocean_forum_posts_v2', JSON.stringify(allPosts));
  renderCurrentFilter();
  showToast('Post reposted! 🔁');
  setTimeout(() => { const el = document.getElementById('post-'+repost.id); if (el) el.scrollIntoView({behavior:'smooth',block:'center'}); }, 200);
}

function addComment(id) {
  const input = document.getElementById('comment-input-'+id);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  const key = 'ocean_forum_comments_v2_'+id;
  const comments = JSON.parse(localStorage.getItem(key)||'[]');
  comments.push({author:'You',date:new Date().toISOString().split('T')[0],text});
  localStorage.setItem(key, JSON.stringify(comments));
  input.value = '';
  loadComments(id);
  renderCurrentFilter();
  showToast('Comment added! 💬');
}

function loadComments(id) {
  const key = 'ocean_forum_comments_v2_' + id;
  const comments = JSON.parse(localStorage.getItem(key)||'[]');
  const listEl = document.getElementById('comments-list-'+id);
  if (!listEl) return;
  if (comments.length===0) { listEl.innerHTML = '<div class="text-xs text-cyan-400/25">No comments yet. Be the first!</div>'; return; }
  listEl.innerHTML = comments.map(c => `
    <div class="bg-cyan-950/20 rounded-lg px-3 py-2 text-xs">
      <div class="flex items-center gap-2 mb-0.5">
        <span class="text-cyan-400/60 font-medium">${c.author}</span>
        <span class="text-cyan-400/20">${c.date}</span>
      </div>
      <p class="text-cyan-200/65">${c.text}</p>
    </div>
  `).join('');
}

let currentFilterTag = null;
function renderCurrentFilter() { renderPosts(currentFilterTag); }

let pendingImageData = null;

function previewPostImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { showToast('Image too large! Max 2MB'); e.target.value = ''; return; }
  const reader = new FileReader();
  reader.onload = function(ev) {
    pendingImageData = ev.target.result;
    document.getElementById('image-preview-name').textContent = file.name;
    document.getElementById('clear-image-btn').classList.remove('hidden');
  };
  reader.readAsDataURL(file);
}

function clearPostImage() {
  pendingImageData = null;
  document.getElementById('post-image').value = '';
  document.getElementById('image-preview-name').textContent = '';
  document.getElementById('clear-image-btn').classList.add('hidden');
}

function submitPost(e) {
  e.preventDefault();
  const author = document.getElementById('post-author').value.trim();
  const title = document.getElementById('post-title').value.trim();
  const content = document.getElementById('post-content').value.trim();
  if (!author||!title||!content) return;
  const p = {id:Date.now(),author,title,content,image:pendingImageData||null,date:new Date().toISOString().split('T')[0],likes:0,reposts:0,comments:0,tags:[],isRepost:false,originalAuthor:null,originalId:null};
  allPosts.unshift(p);
  localStorage.setItem('ocean_forum_posts_v2',JSON.stringify(allPosts));
  localStorage.setItem('ocean_forum_comments_v2_'+p.id,JSON.stringify([]));
  document.getElementById('post-author').value='';
  document.getElementById('post-title').value='';
  document.getElementById('post-content').value='';
  clearPostImage();
  renderCurrentFilter();
  showToast('Post published! 🎉');
  setTimeout(()=>{const el=document.getElementById('post-'+p.id);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},200);
}

function showToast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),2200);
}

document.addEventListener('DOMContentLoaded',()=>{
  renderPosts();
  const v=document.getElementById('global-video');
  if(v){v.play().catch(()=>{});document.addEventListener('click',()=>{v.muted=true;v.play().catch(()=>{});},{once:true});}
});
</script>
