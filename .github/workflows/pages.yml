name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create runtime config
        shell: bash
        run: |
          if [ -n "${{ vars.API_BASE_URL }}" ]; then
            printf "window.API_BASE_URL = '%s';\n" "${{ vars.API_BASE_URL }}" > frontend/app-config.js
          fi
          if [ -n "${{ secrets.MAPBOX_ACCESS_TOKEN }}" ]; then
            printf "window.MAPBOX_ACCESS_TOKEN = '%s';\n" "${{ secrets.MAPBOX_ACCESS_TOKEN }}" > frontend/mapbox-config.js
          fi

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend
