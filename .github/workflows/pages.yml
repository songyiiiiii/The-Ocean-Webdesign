name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Create runtime config
        shell: bash
        run: |
          if [ -n "${{ vars.API_BASE_URL }}" ]; then
            printf "window.API_BASE_URL = '%s';\n" "${{ vars.API_BASE_URL }}" > frontend/app-config.js
          fi
          if [ -n "${{ secrets.MAPBOX_ACCESS_TOKEN }}" ]; then
            printf "window.MAPBOX_ACCESS_TOKEN = '%s';\n" "${{ secrets.MAPBOX_ACCESS_TOKEN }}" > frontend/mapbox-config.js
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
